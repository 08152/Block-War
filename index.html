<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GitHub 3D Viewer FIXED</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div id="ui">Initialisiere 3D...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.181.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.181.1/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* =========================
   BASIC SCENE
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* =========================
   LIGHT
========================= */
scene.add(new THREE.AmbientLight(0xffffff,1.5));

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,10,5);
scene.add(light);

/* =========================
   GRÜNER BODEN
========================= */
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x00aa00})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* =========================
   FALLBACK CUBE
========================= */
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(),
    new THREE.MeshStandardMaterial({color:0xff0000})
);
cube.position.y = 1;
scene.add(cube);

/* =========================
   GLB LOADER
========================= */
const loader = new THREE.GLTFLoader();

/* =========================
   AUTO LOAD
========================= */

function loadModel(){

    console.log("Loading GLB...");

    loader.load(
        "./1.glb",

        function(gltf){

            console.log("GLB OK");

            scene.remove(cube);

            const model = gltf.scene;

            // CENTER FIX
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            // SCALE FIX
            const size = box.getSize(new THREE.Vector3());
            const max = Math.max(size.x,size.y,size.z);
            model.scale.setScalar(2 / max);

            scene.add(model);

            document.getElementById("ui").innerText =
                "GLB geladen ✔";

        },

        function(xhr){
            let p = (xhr.loaded / xhr.total * 100).toFixed(0);
            document.getElementById("ui").innerText =
                "Lade GLB: " + p + "%";
        },

        function(err){
            console.error(err);
            document.getElementById("ui").innerText =
                "FEHLER: GLB nicht geladen";
        }
    );
}

loadModel();

/* =========================
   LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

/* =========================
   RESIZE
========================= */
window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
